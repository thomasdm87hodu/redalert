<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Real-Time Red Alert Radar</title>
    
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS (Cloudflare CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    
    <style>
        /* Map Container */
        #map {
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
        }

        /* Radar Pulse Animations */
        .radar-blip-container {
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .radar-blip {
            width: 12px;
            height: 12px;
            background-color: #ef4444;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444;
            z-index: 10;
        }

        .radar-pulse-1, .radar-pulse-2 {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: radar-ping 2.5s infinite ease-out;
            z-index: 5;
        }

        .radar-pulse-2 {
            animation-delay: 1.25s;
        }

        @keyframes radar-ping {
            0% { 
                transform: scale(0.5); 
                opacity: 1; 
                border: 2px solid #ef4444; 
                background: rgba(239, 68, 68, 0.8); 
            }
            100% { 
                transform: scale(15); 
                opacity: 0; 
                border: 1px solid #ef4444; 
                background: transparent; 
            }
        }

        /* UI Animations */
        @keyframes flash-bg {
            0%, 100% { background-color: rgba(127, 29, 29, 0.4); border-color: rgba(239, 68, 68, 0.5); }
            50% { background-color: rgba(239, 68, 68, 0.8); border-color: rgba(239, 68, 68, 1); }
        }
        
        .animate-flash {
            animation: flash-bg 1s ease-in-out 3;
        }

        /* Network Pulse */
        @keyframes net-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .net-activity {
            animation: net-pulse 0.5s ease-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen w-screen overflow-hidden relative">

    <!-- Background Map -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- UI Overlay Panel -->
    <div class="absolute top-4 left-4 z-10 w-80 sm:w-96 bg-gray-900 bg-opacity-90 rounded-xl shadow-2xl border border-gray-700 backdrop-blur-md flex flex-col overflow-hidden">
        <!-- Header -->
        <div class="bg-red-700 p-4 flex items-center justify-between shadow-md">
            <h1 class="text-white font-bold text-lg flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-200 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
                </span>
                Live Alert Radar
            </h1>
            <div id="network-indicator" class="h-2 w-2 rounded-full bg-green-400 opacity-50 transition-all duration-200" title="Network Activity"></div>
        </div>
        
        <div class="p-5 flex flex-col gap-4">
            <!-- Connection Status -->
            <div class="flex flex-col gap-1 text-sm border-b border-gray-700 pb-3">
                <div class="flex items-center justify-between">
                    <span class="text-gray-400">Vercel API:</span>
                    <span id="api-status" class="text-yellow-400 font-mono text-xs">Connecting...</span>
                </div>
                <div class="flex items-center justify-between mt-1">
                    <span class="text-gray-400">WebSocket:</span>
                    <span id="ws-status" class="text-yellow-400 font-mono text-xs">Connecting...</span>
                </div>
            </div>
            
            <!-- Alert Feed -->
            <div class="pt-1 flex-1 flex flex-col">
                <h2 class="text-xs text-gray-400 mb-3 uppercase tracking-wider font-semibold">Alert Feed (History)</h2>
                <ul id="alerts-list" class="space-y-2 max-h-48 overflow-y-auto">
                    <li class="text-gray-500 text-sm italic py-2" id="no-alerts-msg">No threats detected yet.</li>
                </ul>
            </div>
            
            <!-- Manual Controls for Demo -->
            <div class="border-t border-gray-700 pt-4 mt-1">
                <button onclick="simulateAlert()" class="w-full bg-gray-700 hover:bg-gray-600 active:bg-gray-500 text-white font-medium py-2.5 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                    </svg>
                    Simulate Radar Alert
                </button>
            </div>
        </div>
    </div>

    <!-- Debug Modal -->
    <div id="debug-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-600 rounded-lg shadow-xl w-11/12 max-w-md p-5 flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                <h3 class="text-red-400 font-bold text-lg">Connection Debug Info</h3>
                <button onclick="closeDebug()" class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <pre id="debug-content" class="text-xs text-gray-300 font-mono whitespace-pre-wrap bg-gray-900 p-3 rounded overflow-x-auto border border-gray-700"></pre>
            <button onclick="closeDebug()" class="bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-md transition-colors text-sm font-semibold mt-2">Close Debugger</button>
        </div>
    </div>

    <!-- Leaflet JS (Cloudflare CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    
    <script>
        // --- 1. INITIALIZE MAP (Dark Tactical Theme) ---
        const map = L.map('map', { zoomControl: false }).setView([31.5, 34.8], 8);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // --- 2. COORDINATES & TRANSLATION DICTIONARY ---
        const cityCoordinates = {
            "תל אביב - יפו": [32.0853, 34.7818], "חיפה": [32.7940, 34.9896], "ירושלים": [31.7683, 35.2137],
            "שדרות": [31.5235, 34.5947], "אשקלון": [31.6693, 34.5715], "אשדוד": [31.8044, 34.6553],
            "באר שבע": [31.2518, 34.7913], "נתיבות": [31.4158, 34.5878], "אופקים": [31.3129, 34.6208],
            "קרית שמונה": [33.2073, 35.5697], "מטולה": [33.2798, 35.5786], "נהריה": [33.0084, 35.0933],
            "צפת": [32.9646, 35.4960], "טבריה": [32.7945, 35.5333], "עפולה": [32.6066, 35.2880],
            "חדרה": [32.4340, 34.9197], "נתניה": [32.3215, 34.8532], "הרצליה": [32.1624, 34.8447],
            "ראשון לציון": [31.9730, 34.7925], "רחובות": [31.8928, 34.8113], "מודיעין": [31.8903, 35.0064],
            "בית שמש": [31.7455, 34.9867], "אילת": [29.5581, 34.9482]
        };

        const cityTranslations = {
            "תל אביב - יפו": "Tel Aviv",
            "חיפה": "Haifa",
            "ירושלים": "Jerusalem",
            "שדרות": "Sderot",
            "אשקלון": "Ashkelon",
            "אשדוד": "Ashdod",
            "באר שבע": "Beersheba",
            "נתיבות": "Netivot",
            "אופקים": "Ofakim",
            "קרית שמונה": "Kiryat Shmona",
            "מטולה": "Metula",
            "נהריה": "Nahariya",
            "צפת": "Safed",
            "טבריה": "Tiberias",
            "עפולה": "Afula",
            "חדרה": "Hadera",
            "נתניה": "Netanya",
            "הרצליה": "Herzliya",
            "ראשון לציון": "Rishon LeZion",
            "רחובות": "Rehovot",
            "מודיעין": "Modi'in",
            "בית שמש": "Beit Shemesh",
            "אילת": "Eilat"
        };

        function translateCity(cityName) {
            // Direct match
            if (cityTranslations[cityName]) return cityTranslations[cityName];
            
            // Fuzzy match for sub-regions (e.g. "Ashkelon South" -> "Ashkelon")
            for (let hebrew in cityTranslations) {
                let mainPart = hebrew.split(' - ')[0].trim();
                if (cityName.includes(mainPart) || hebrew.includes(cityName)) {
                    return cityTranslations[hebrew];
                }
            }
            
            // Fallback to original Hebrew if no translation matches
            return cityName;
        }

        // --- 3. AUDIO ENGINE ---
        let audioCtx;
        let audioContextEnabled = false;

        function initAudio() {
            if (!audioContextEnabled) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                audioContextEnabled = true;
            }
        }
        document.addEventListener('click', initAudio, { once: true });

        function playBeep() {
            if (!audioContextEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(850, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.35);
            
            gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        // --- 4. ALERT LOGIC & UI UPDATES ---
        const activeMarkers = new Map();
        const recentAlerts = new Set(); 

        function flashNetworkIndicator() {
            const indicator = document.getElementById('network-indicator');
            indicator.classList.remove('net-activity');
            void indicator.offsetWidth; 
            indicator.classList.add('net-activity');
        }

        function getCoords(cityName) {
            if (cityCoordinates[cityName]) return cityCoordinates[cityName];
            for (let knownCity in cityCoordinates) {
                let mainPart = knownCity.split(' - ')[0].trim();
                if (cityName.includes(mainPart) || knownCity.includes(cityName)) {
                    return cityCoordinates[knownCity];
                }
            }
            return [31.5 + (Math.random() * 1.5 - 0.75), 34.8 + (Math.random() * 0.5 - 0.25)];
        }

        function updateAlertUI(cityName, alertId) {
            const list = document.getElementById('alerts-list');
            const noAlerts = document.getElementById('no-alerts-msg');
            if (noAlerts) noAlerts.style.display = 'none';

            const li = document.createElement('li');
            li.id = 'alert-item-' + alertId;
            // Start as an active red alert
            li.className = 'bg-red-900 bg-opacity-40 border border-red-500 rounded-md p-3 text-sm text-white flex justify-between items-center animate-flash shadow-md transition-colors duration-1000';
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const translatedName = translateCity(cityName);

            li.innerHTML = `<span class="font-bold tracking-wide">${translatedName}</span><span class="text-xs text-red-300 font-mono time-stamp">${time}</span>`;
            list.insertBefore(li, list.firstChild);

            // Keep history capped at 50 items so the browser doesn't lag over time
            if (list.children.length > 50) {
                list.removeChild(list.lastChild);
            }
        }

        function expireAlertUI(alertId) {
            const existing = document.getElementById('alert-item-' + alertId);
            if (existing) {
                // Dim the alert to look like history instead of removing it
                existing.className = 'bg-gray-800 bg-opacity-40 border border-gray-700 rounded-md p-3 text-sm text-gray-400 flex justify-between items-center transition-colors duration-1000';
                const timeStamp = existing.querySelector('.time-stamp');
                if (timeStamp) timeStamp.className = 'text-xs text-gray-500 font-mono';
            }
        }

        function triggerAlert(cityName) {
            const alertId = Date.now() + '-' + Math.random().toString(36).substr(2, 5);

            if (activeMarkers.has(cityName)) {
                clearTimeout(activeMarkers.get(cityName).timeout);
                activeMarkers.get(cityName).marker.remove();
                activeMarkers.delete(cityName);
            }
            
            const coords = getCoords(cityName);
            const icon = L.divIcon({
                className: 'radar-blip-container',
                html: `<div class="radar-pulse-1"></div><div class="radar-pulse-2"></div><div class="radar-blip"></div>`,
                iconSize: [24, 24]
            });

            const marker = L.marker(coords, { icon }).addTo(map);
            map.flyTo(coords, Math.max(map.getZoom(), 10), { duration: 1.5 });

            updateAlertUI(cityName, alertId);
            playBeep();

            const timeout = setTimeout(() => {
                marker.remove();
                activeMarkers.delete(cityName);
                expireAlertUI(alertId); // Dim it instead of deleting it
            }, 45000);

            activeMarkers.set(cityName, { marker, timeout });
        }

        function simulateAlert() {
            initAudio(); 
            const cities = Object.keys(cityCoordinates);
            const randomCity = cities[Math.floor(Math.random() * cities.length)];
            processIncomingData([randomCity]);
        }

        // Central payload processor handling multiple API formats
        function processIncomingData(payload) {
            if (!payload) return;
            flashNetworkIndicator();
            
            let cities = [];
            
            // Extract from various array/object structures
            if (Array.isArray(payload)) {
                payload.forEach(item => {
                    if (typeof item === 'string') cities.push(item);
                    else if (item.cities) cities.push(...item.cities);
                    else if (item.data) cities.push(...item.data);
                });
            } else if (payload.cities) {
                cities.push(...payload.cities);
            } else if (payload.data && Array.isArray(payload.data)) {
                cities.push(...payload.data);
            }
            
            cities.forEach(city => {
                if (city && !recentAlerts.has(city)) {
                    recentAlerts.add(city);
                    triggerAlert(city);
                    setTimeout(() => recentAlerts.delete(city), 60000); 
                }
            });
        }

        // --- 5. DUAL ENGINE NETWORKING ---
        let lastErrorDetails = "No errors recorded yet.";

        function showDebug() {
            document.getElementById('debug-content').textContent = lastErrorDetails;
            document.getElementById('debug-modal').classList.remove('hidden');
        }

        function closeDebug() {
            document.getElementById('debug-modal').classList.add('hidden');
        }

        // Engine 1: Background WebSocket (Socket.io Protocol)
        let ws;
        function connectWS() {
            const statusEl = document.getElementById('ws-status');
            try {
                // Use strict Socket.io v4 websocket transport path
                ws = new WebSocket('wss://api.tzevaadom.co.il/socket.io/?EIO=4&transport=websocket');
                
                ws.onopen = () => {
                    statusEl.textContent = 'Connected';
                    statusEl.className = 'text-green-400 font-mono text-xs';
                    // Socket.io requires a '2' (ping) message to keep the connection alive
                    ws.pingInterval = setInterval(() => {
                        if(ws.readyState === WebSocket.OPEN) ws.send('2');
                    }, 25000);
                };
                
                ws.onmessage = (event) => {
                    // Socket.io messages start with numbers, e.g., '42["notification", {...}]'
                    if (typeof event.data === 'string' && event.data.startsWith('42')) {
                        try {
                            const payload = JSON.parse(event.data.substring(2));
                            // payload[1] contains the actual alert data object
                            if (payload && payload[1]) {
                                processIncomingData(payload[1]);
                            }
                        } catch(e) { /* ignore parse errors */ }
                    }
                };
                
                ws.onclose = () => {
                    clearInterval(ws.pingInterval);
                    statusEl.textContent = 'Standby (Using API)';
                    statusEl.className = 'text-gray-400 font-mono text-xs';
                    // Try to reconnect gracefully without spamming
                    setTimeout(connectWS, 10000);
                };
                
                ws.onerror = () => ws.close();
            } catch(err) {
                statusEl.textContent = 'Standby (Using API)';
                statusEl.className = 'text-gray-400 font-mono text-xs';
            }
        }

        // Engine 2: Vercel Backend Polling
        let isPolling = false;
        async function pollAPI() {
            if (isPolling) return;
            isPolling = true;

            const statusEl = document.getElementById('api-status');
            const cacheBuster = new Date().getTime(); 
            const url = `/api/proxy?t=${cacheBuster}`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4500);

                const response = await fetch(url, { 
                    method: 'GET',
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    const textData = await response.text();
                    if (textData && textData.trim().length > 0) {
                        processIncomingData(JSON.parse(textData)); 
                    }
                    statusEl.innerHTML = `OK (Live)`;
                    statusEl.className = 'text-green-400 font-mono text-xs';
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (err) {
                let errMessage = err.name === 'AbortError' ? 'Timeout' : err.message;
                
                // If the browser strictly blocked it due to an adblocker
                if (errMessage === 'Failed to fetch') {
                    errMessage = 'Browser/Adblocker blocked request';
                }

                lastErrorDetails = `[Vercel API Failed]\nReason: ${errMessage}\n\nNote: As long as the WebSocket says "Connected", you will still receive alerts in real-time.`;
                statusEl.innerHTML = `Error <button onclick="showDebug()" class="text-blue-400 underline hover:text-blue-300 ml-1 cursor-pointer">Debug</button>`;
                statusEl.className = 'text-red-400 font-mono text-xs';
            }

            isPolling = false;
        }

        // Start both engines
        connectWS();
        setInterval(pollAPI, 3000);
        pollAPI();

    </script>
</body>
</html>
