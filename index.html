<!DOCTYPE html>

    <style>
        /* Map Container */
        #map {
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
        }

        /* Radar Pulse Animations */
        .radar-blip-container {
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .radar-blip {
            width: 12px;
            height: 12px;
            background-color: #ef4444;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444;
            z-index: 10;
        }

        .radar-pulse-1, .radar-pulse-2 {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: radar-ping 2.5s infinite ease-out;
            z-index: 5;
        }

        .radar-pulse-2 {
            animation-delay: 1.25s;
        }

        @keyframes radar-ping {
            0% { 
                transform: scale(0.5); 
                opacity: 1; 
                border: 2px solid #ef4444; 
                background: rgba(239, 68, 68, 0.8); 
            }
            100% { 
                transform: scale(15); 
                opacity: 0; 
                border: 1px solid #ef4444; 
                background: transparent; 
            }
        }

        /* UI Animations */
        @keyframes flash-bg {
            0%, 100% { background-color: rgba(127, 29, 29, 0.4); border-color: rgba(239, 68, 68, 0.5); }
            50% { background-color: rgba(239, 68, 68, 0.8); border-color: rgba(239, 68, 68, 1); }
        }
        
        .animate-flash {
            animation: flash-bg 1s ease-in-out 3;
        }

        /* Network Pulse */
        @keyframes net-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .net-activity {
            animation: net-pulse 0.5s ease-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>

        function translateCity(cityName) {
            if (!cityName) return "";
            
            // Direct exact match
            if (cityTranslations[cityName]) return `${cityName} (${cityTranslations[cityName]})`;
            
            // Sort keys by length descending so we don't accidentally match short words inside long words
            const sortedKeys = Object.keys(cityTranslations).sort((a, b) => b.length - a.length);
            
            // Smart Fuzzy Match (scans the real alert string to see if any known town/region exists within it)
            for (let hebrew of sortedKeys) {
                if (cityName.includes(hebrew)) {
                    return `${cityName} (${cityTranslations[hebrew]})`;
                }
            }
            
            // Fallback to original Hebrew if completely unknown
            return cityName;
        }

        // --- 3. BROWSER-SAFE AUDIO ENGINE ---
        let audioCtx;
        let isSoundEnabled = false;

        function toggleSound() {
            // Create context if it doesn't exist yet
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            if (!isSoundEnabled) {
                // Resume the context (must happen during user click)
                audioCtx.resume().then(() => {
                    isSoundEnabled = true;
                    document.getElementById('sound-off-icon').classList.add('hidden');
                    document.getElementById('sound-on-icon').classList.remove('hidden');
                    document.getElementById('sound-toggle').classList.replace('bg-red-800', 'bg-green-700');
                    document.getElementById('sound-toggle').classList.replace('border-red-600', 'border-green-500');
                    playBeep(); // Play a test beep so the user knows it works
                });
            } else {
                // Mute
                isSoundEnabled = false;
                document.getElementById('sound-on-icon').classList.add('hidden');
                document.getElementById('sound-off-icon').classList.remove('hidden');
                document.getElementById('sound-toggle').classList.replace('bg-green-700', 'bg-red-800');
                document.getElementById('sound-toggle').classList.replace('border-green-500', 'border-red-600');
            }
        }

        function playBeep() {
            if (!isSoundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(850, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.35);
            
            gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        // --- 4. ALERT LOGIC & UI UPDATES ---
        const activeMarkers = new Map();
        const recentAlerts = new Set(); 

        function flashNetworkIndicator() {
            const indicator = document.getElementById('network-indicator');
            indicator.classList.remove('net-activity');
            void indicator.offsetWidth; 
            indicator.classList.add('net-activity');
        }

        function getCoords(cityName) {
            // Check direct mapping (with expanded dictionary)
            if (cityCoordinates[cityName]) return cityCoordinates[cityName];
            
            // Check fuzzy mapping (sort keys to match longest specific town names first)
            const sortedKeys = Object.keys(cityCoordinates).sort((a, b) => b.length - a.length);
            for (let knownCity of sortedKeys) {
                let mainPart = knownCity.split(' - ')[0].trim();
                if (cityName.includes(mainPart) || knownCity.includes(cityName)) {
                    return cityCoordinates[knownCity];
                }
            }

            // Smart Regional Fallbacks (Tightened to stay on land)
            if (cityName.includes('גליל') || cityName.includes('צפת') || cityName.includes('שמונה')) return [32.9 + (Math.random() * 0.2), 35.3 + (Math.random() * 0.2)];
            if (cityName.includes('גולן') || cityName.includes('קצרין')) return [33.0 + (Math.random() * 0.2), 35.6 + (Math.random() * 0.2)];
            if (cityName.includes('עזה') || cityName.includes('שדרות') || cityName.includes('אשקלון')) return [31.4 + (Math.random() * 0.1), 34.55 + (Math.random() * 0.1)];
            if (cityName.includes('נגב') || cityName.includes('באר שבע')) return [31.1 + (Math.random() * 0.3), 34.8 + (Math.random() * 0.2)];
            if (cityName.includes('לכיש')) return [31.55 + (Math.random() * 0.1), 34.75 + (Math.random() * 0.1)];
            if (cityName.includes('שרון') || cityName.includes('נתניה')) return [32.3 + (Math.random() * 0.1), 34.9 + (Math.random() * 0.1)];
            if (cityName.includes('דן') || cityName.includes('תל אביב')) return [32.0 + (Math.random() * 0.1), 34.85 + (Math.random() * 0.1)];
            if (cityName.includes('יהודה') || cityName.includes('שומרון') || cityName.includes('ירושלים')) return [31.8 + (Math.random() * 0.4 - 0.2), 35.2 + (Math.random() * 0.1)];
            if (cityName.includes('אילת') || cityName.includes('ערבה')) return [29.6 + (Math.random() * 0.3), 35.0 + (Math.random() * 0.1)];

            // Default random spread strictly bound to central INLAND Israel
            return [31.75 + (Math.random() * 0.2 - 0.1), 34.95 + (Math.random() * 0.1)];
        }

        function updateAlertUI(cityName, alertId) {
            const list = document.getElementById('alerts-list');
            const noAlerts = document.getElementById('no-alerts-msg');
            if (noAlerts) noAlerts.style.display = 'none';

            const li = document.createElement('li');
            li.id = 'alert-item-' + alertId;
            li.className = 'bg-red-900 bg-opacity-40 border border-red-500 rounded-md p-3 text-sm text-white flex justify-between items-center animate-flash shadow-md transition-colors duration-1000';
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const translatedName = translateCity(cityName);

            li.innerHTML = `<span class="font-bold tracking-wide" dir="auto">${translatedName}</span><span class="text-xs text-red-300 font-mono time-stamp whitespace-nowrap ml-2">${time}</span>`;
            list.insertBefore(li, list.firstChild);

            if (list.children.length > 50) {
                list.removeChild(list.lastChild);
            }
        }

        function expireAlertUI(alertId) {
            const existing = document.getElementById('alert-item-' + alertId);
            if (existing) {
                existing.className = 'bg-gray-800 bg-opacity-40 border border-gray-700 rounded-md p-3 text-sm text-gray-400 flex justify-between items-center transition-colors duration-1000';
                const timeStamp = existing.querySelector('.time-stamp');
                if (timeStamp) timeStamp.className = 'text-xs text-gray-500 font-mono whitespace-nowrap ml-2';
            }
        }

        function triggerAlert(cityName) {
            const alertId = Date.now() + '-' + Math.random().toString(36).substr(2, 5);

            if (activeMarkers.has(cityName)) {
                clearTimeout(activeMarkers.get(cityName).timeout);
                activeMarkers.get(cityName).marker.remove();
                activeMarkers.delete(cityName);
            }
            
            const coords = getCoords(cityName);
            const icon = L.divIcon({
                className: 'radar-blip-container',
                html: `<div class="radar-pulse-1"></div><div class="radar-pulse-2"></div><div class="radar-blip"></div>`,
                iconSize: [24, 24]
            });

            const marker = L.marker(coords, { icon }).addTo(map);
            map.flyTo(coords, Math.max(map.getZoom(), 10), { duration: 1.5 });

            updateAlertUI(cityName, alertId);
            playBeep();

            const timeout = setTimeout(() => {
                marker.remove();
                activeMarkers.delete(cityName);
                expireAlertUI(alertId); 
            }, 45000);

            activeMarkers.set(cityName, { marker, timeout });
        }

        function simulateAlert() {
            // Create audio context on first user interaction if it hasn't been done
            if (!audioCtx && !isSoundEnabled) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const cities = Object.keys(cityCoordinates);
            const randomCity = cities[Math.floor(Math.random() * cities.length)];
            processIncomingData([randomCity]);
        }

        function processIncomingData(payload) {
            if (!payload) return;
            flashNetworkIndicator();
            
            let cities = [];
            
            if (Array.isArray(payload)) {
                payload.forEach(item => {
                    if (typeof item === 'string') cities.push(item);
                    else if (item.cities) cities.push(...item.cities);
                    else if (item.data) cities.push(...item.data);
                });
            } else if (payload.cities) {
                cities.push(...payload.cities);
            } else if (payload.data && Array.isArray(payload.data)) {
                cities.push(...payload.data);
            }
            
            cities.forEach(city => {
                if (city && !recentAlerts.has(city)) {
                    recentAlerts.add(city);
                    triggerAlert(city);
                    setTimeout(() => recentAlerts.delete(city), 60000); 
                }
            });
        }

        // --- 5. DUAL ENGINE NETWORKING ---
        let lastErrorDetails = "No errors recorded yet.";

        function showDebug() {
            document.getElementById('debug-content').textContent = lastErrorDetails;
            document.getElementById('debug-modal').classList.remove('hidden');
        }

        function closeDebug() {
            document.getElementById('debug-modal').classList.add('hidden');
        }

        // Engine 1: Background WebSocket (Socket.io Protocol)
        let ws;
        function connectWS() {
            const statusEl = document.getElementById('ws-status');
            try {
                ws = new WebSocket('wss://api.tzevaadom.co.il/socket.io/?EIO=4&transport=websocket');
                
                ws.onopen = () => {
                    statusEl.textContent = 'Connected';
                    statusEl.className = 'text-green-400 font-mono text-xs';
                    ws.pingInterval = setInterval(() => {
                        if(ws.readyState === WebSocket.OPEN) ws.send('2');
                    }, 25000);
                };
                
                ws.onmessage = (event) => {
                    if (typeof event.data === 'string' && event.data.startsWith('42')) {
                        try {
                            const payload = JSON.parse(event.data.substring(2));
                            if (payload && payload[1]) {
                                processIncomingData(payload[1]);
                            }
                        } catch(e) { }
                    }
                };
                
                ws.onclose = () => {
                    clearInterval(ws.pingInterval);
                    statusEl.textContent = 'Standby (Using API)';
                    statusEl.className = 'text-gray-400 font-mono text-xs';
                    setTimeout(connectWS, 10000);
                };
                
                ws.onerror = () => ws.close();
            } catch(err) {
                statusEl.textContent = 'Standby (Using API)';
                statusEl.className = 'text-gray-400 font-mono text-xs';
            }
        }

        // Engine 2: Vercel Backend Polling
        let isPolling = false;
        async function pollAPI() {
            if (isPolling) return;
            isPolling = true;

            const statusEl = document.getElementById('api-status');
            const cacheBuster = new Date().getTime(); 
            const url = `/api/proxy?t=${cacheBuster}`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4500);

                const response = await fetch(url, { 
                    method: 'GET',
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    const textData = await response.text();
                    if (textData && textData.trim().length > 0) {
                        processIncomingData(JSON.parse(textData)); 
                    }
                    statusEl.innerHTML = `OK (Live)`;
                    statusEl.className = 'text-green-400 font-mono text-xs';
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (err) {
                let errMessage = err.name === 'AbortError' ? 'Timeout' : err.message;
                if (errMessage === 'Failed to fetch') errMessage = 'Browser/Adblocker blocked request';

                lastErrorDetails = `[Vercel API Failed]\nReason: ${errMessage}\n\nNote: As long as the WebSocket says "Connected", you will still receive alerts in real-time.`;
                statusEl.innerHTML = `Error <button onclick="showDebug()" class="text-blue-400 underline hover:text-blue-300 ml-1 cursor-pointer">Debug</button>`;
                statusEl.className = 'text-red-400 font-mono text-xs';
            }

            isPolling = false;
        }

        // Start both engines
        connectWS();
        setInterval(pollAPI, 3000);
        pollAPI();

        // --- 6. DRAGGABLE UI PANEL ---
        const uiPanel = document.getElementById('ui-panel');
        const uiHeader = document.getElementById('ui-panel-header');

        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        uiHeader.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        uiHeader.addEventListener('touchstart', dragStart, {passive: true});
        document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            // Ignore if clicking a button inside the header (like the sound toggle)
            if (e.target.closest('button')) return;

            isDragging = true;
            
            // Get initial touch/click position
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }

            // Get initial element position
            const rect = uiPanel.getBoundingClientRect();
            initialLeft = rect.left;
            initialTop = rect.top;
            
            // Switch layout attributes to ensure clean dragging
            uiPanel.style.bottom = 'auto';
            uiPanel.style.right = 'auto';
            uiPanel.style.margin = '0';
            
            // Apply current rect position immediately to override absolute Tailwind classes cleanly
            uiPanel.style.left = `${initialLeft}px`;
            uiPanel.style.top = `${initialTop}px`;
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault(); // Prevent scrolling on touch devices while dragging

            let currentX, currentY;
            
            if (e.type === 'touchmove') {
                currentX = e.touches[0].clientX;
                currentY = e.touches[0].clientY;
            } else {
                currentX = e.clientX;
                currentY = e.clientY;
            }

            const deltaX = currentX - startX;
            const deltaY = currentY - startY;

            let newLeft = initialLeft + deltaX;
            let newTop = initialTop + deltaY;
            
            uiPanel.style.left = `${newLeft}px`;
            uiPanel.style.top = `${newTop}px`;
        }

        function dragEnd() {
            isDragging = false;
        }

    </script>
</body>
